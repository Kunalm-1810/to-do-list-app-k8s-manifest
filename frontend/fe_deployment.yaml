apiVersion: apps/v1
kind: Deployment
metadata:
  name: fe-deployment
  labels:
    app: fe-app
    env: production
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: fe-app
      env: production
  template:
    metadata:
      labels:
        app: fe-app
        env: production
    spec:
      containers:
        - name: fe-container
          image: kunalmane/fe:v1
          ports:
            - containerPort: 3000
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
          requests:
              memory: "256Mi"
              cpu: "250m"
      imagePullSecrets:
        - name: regcred
      livenessProbe:
         httpGet: